<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form Detection</title>
</head>
<body>
  <!-- This hidden form helps Netlify detect the form structure -->
  <form name="enquiry" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="product" />
    <input type="text" name="quantity" />
    <input type="text" name="location" />
    <textarea name="message"></textarea>
    <input type="radio" name="preferredContact" value="email" />
    <input type="radio" name="preferredContact" value="phone" />
    <input type="radio" name="preferredContact" value="whatsapp" />
  </form>
</body>
</html>
